name: MacFinderPlus
options:
  bundleIdPrefix: com.qnsub
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  Workbench:
    type: application
    platform: macOS
    sources:
      - Assets.xcassets
      - Sources
    entitlements:
      path: Workbench.entitlements
      properties:
        # Workbench ships via direct download (not the Mac App Store), so it is NOT
        # sandboxed — the sandbox blocks spawning /usr/sbin/screencapture, which
        # the screenshot/recording tools rely on. Hardened runtime stays on for
        # notarization; audio-input re-enables the mic under hardened runtime.
        com.apple.security.device.audio-input: true
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Workbench
        CFBundleName: Workbench
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSApplicationCategoryType: public.app-category.utilities
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "© 2026 Cholo Asis. All rights reserved."
        NSMicrophoneUsageDescription: Workbench uses the microphone for narrated screen recordings, voice notes, and note attachments.
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.choloasis.panes.file-drag
            UTTypeDescription: Workbench File Drag
            UTTypeConformsTo:
              - public.data
    settings:
      base:
        # Keep the compiled module aligned with the product name and shared scheme.
        PRODUCT_NAME: Workbench
        PRODUCT_MODULE_NAME: Workbench
        PRODUCT_BUNDLE_IDENTIFIER: com.qnsub.workbench.app
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - WorkbenchTests
  WorkbenchTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: Workbench
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qnsub.workbench.app.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Workbench.app/Contents/MacOS/Workbench"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
